<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Letters written with love.">
  <title>For my baby &lt;3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-letters">
  <div id="heart-field" class="heart-field" aria-hidden="true"></div>

  <header class="letters-header" data-ui-zone>
    <a href="index.html" class="btn-back" aria-label="Back to home">
      <svg class="btn-back-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      <span>Back</span>
    </a>
  </header>

  <main class="letters-main">
    <div class="letters-intro" data-ui-zone>
      <h1 class="letters-heading">Letters for you</h1>
      <p class="letters-subheading">Tap a card to open a letter</p>
    </div>

    <div class="letters-grid" data-ui-zone>
      <a href="letters/letter1.pdf" class="letter-pdf-card" target="_blank" rel="noopener noreferrer">
        <span class="letter-pdf-icon" aria-hidden="true">💌</span>
        <h2 class="letter-pdf-title">Letter One</h2>
        <p class="letter-pdf-hint">Open PDF</p>
      </a>
      <a href="letters/letter2.pdf" class="letter-pdf-card" target="_blank" rel="noopener noreferrer">
        <span class="letter-pdf-icon" aria-hidden="true">💕</span>
        <h2 class="letter-pdf-title">Letter Two</h2>
        <p class="letter-pdf-hint">Open PDF</p>
      </a>
      <a href="letters/letter3.pdf" class="letter-pdf-card" target="_blank" rel="noopener noreferrer">
        <span class="letter-pdf-icon" aria-hidden="true">💖</span>
        <h2 class="letter-pdf-title">Letter Three</h2>
        <p class="letter-pdf-hint">Open PDF</p>
      </a>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
