<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A little corner of the internet, just for us.">
  <title>For my baby &lt;3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-home">
  <div id="heart-field" class="heart-field" aria-hidden="true"></div>

  <header class="site-header" data-ui-zone>
    <a href="letters.html" class="btn-letters">Letters</a>
  </header>

  <main class="home-main">
    <section class="polaroid-section" aria-label="Our photos">
      <div class="polaroid-stack" data-ui-zone>
        <div class="polaroid polaroid--layer polaroid--back" aria-hidden="true">
          <span class="polaroid-photo-area polaroid-photo-area--empty"></span>
          <span class="polaroid-footer"></span>
        </div>
        <div class="polaroid polaroid--layer polaroid--mid" aria-hidden="true">
          <span class="polaroid-photo-area polaroid-photo-area--empty"></span>
          <span class="polaroid-footer"></span>
        </div>
        <button
          type="button"
          class="polaroid polaroid--layer polaroid--top"
          id="polaroid"
          aria-label="Show next photo"
        >
          <span class="polaroid-photo-area">
            <img
              id="polaroid-img"
              class="polaroid-img"
              src="images/pic1.jpg"
              alt="Memory 1 of 16"
              width="320"
              height="320"
              draggable="false"
            >
          </span>
          <span class="polaroid-footer" aria-hidden="true"></span>
        </button>
      </div>
    </section>
  </main>

  <aside class="timer-panel" data-ui-zone aria-live="polite">
    <section class="timer-block" aria-label="Time together">
      <p class="timer-label">⏳ Together for</p>
      <div class="timer-grid">
        <div class="timer-unit">
          <span id="timer-days" class="timer-value">0</span>
          <span class="timer-name">days</span>
        </div>
        <div class="timer-unit">
          <span id="timer-hours" class="timer-value">0</span>
          <span class="timer-name">hours</span>
        </div>
        <div class="timer-unit">
          <span id="timer-minutes" class="timer-value">0</span>
          <span class="timer-name">minutes</span>
        </div>
        <div class="timer-unit">
          <span id="timer-seconds" class="timer-value">0</span>
          <span class="timer-name">seconds</span>
        </div>
      </div>
    </section>

    <section class="timer-block timer-block--countdown" aria-label="Countdown to next meeting">
      <p class="timer-label timer-label--meet">Next time we'll meet:</p>
      <div class="timer-grid">
        <div class="timer-unit">
          <span id="countdown-days" class="timer-value">0</span>
          <span class="timer-name">days</span>
        </div>
        <div class="timer-unit">
          <span id="countdown-hours" class="timer-value">0</span>
          <span class="timer-name">hours</span>
        </div>
        <div class="timer-unit">
          <span id="countdown-minutes" class="timer-value">0</span>
          <span class="timer-name">minutes</span>
        </div>
        <div class="timer-unit">
          <span id="countdown-seconds" class="timer-value">0</span>
          <span class="timer-name">seconds</span>
        </div>
      </div>
    </section>
  </aside>

  <script src="script.js"></script>
</body>
</html>
