<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A little corner of the internet, just for us.">
  <title>For You ♡</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-home">
  <div id="heart-field" class="heart-field" aria-hidden="true"></div>

  <header class="site-header">
    <a href="letters.html" class="btn-letters">Letters</a>
  </header>
  
  <main class="home-main">
    <section class="photo-section" aria-label="Our photo">
      <figure class="photo-frame">
        <div class="photo-inner">
          <!-- Replace src with your photo path, e.g. images/us.jpg -->
          <img
            src="https://placehold.co/420x520/FFC5D3/F8C5FA?text=Add+Our+Photo"
            alt="A photo of us together"
            class="couple-photo"
            width="420"
            height="520"
          >
        </div>
        <figcaption class="photo-caption">my favorite person</figcaption>
      </figure>
    </section>
  </main>

  <aside class="timer-panel" aria-live="polite" aria-label="Time together">
    <p class="timer-label">together for</p>
    <div class="timer-grid">
      <div class="timer-unit">
        <span id="timer-days" class="timer-value">0</span>
        <span class="timer-name">days</span>
      </div>
      <div class="timer-unit">
        <span id="timer-hours" class="timer-value">0</span>
        <span class="timer-name">hours</span>
      </div>
      <div class="timer-unit">
        <span id="timer-minutes" class="timer-value">0</span>
        <span class="timer-name">minutes</span>
      </div>
      <div class="timer-unit">
        <span id="timer-seconds" class="timer-value">0</span>
        <span class="timer-name">seconds</span>
      </div>
    </div>
  </aside>

  <script src="script.js"></script>
</body>
</html>
